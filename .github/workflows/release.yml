name: Release Extension

on:
  push:
    branches:
      - prod # Triggers when you push to the prod branch

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to create the release and upload assets
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Create Extension Zips
        # Using your package.json scripts
        run: |
          npm run zip
          npm run zip:firefox

      - name: Get Version from package.json
        id: get_version
        run: echo "VERSION=$(node -e "import fs from 'fs'; const pkg = JSON.parse(fs.readFileSync('./package.json', 'utf8')); console.log(pkg.version);")" >> $GITHUB_ENV

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: .output/*.zip
          tag_name: v${{ env.VERSION }}
          name: Release v${{ env.VERSION }}
          body: "New automated release for version ${{ env.VERSION }}"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}